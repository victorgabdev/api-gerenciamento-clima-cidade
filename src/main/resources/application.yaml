server:
  port: 8089

spring:
  ## APPLICATION ##
  application:
    name: api-genciamento-clima-cidade

  ## POSTGRESQL DATABASE ##
  datasource:
    url: jdbc:postgresql://localhost:5432/db_clima_cidade
    username: postgres
    password: user
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect